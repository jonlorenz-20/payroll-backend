version: '3.8'

services:
  # 1. DATABASE (PostgreSQL)
  db:
    image: postgres:16
    container_name: payroll-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: sekyurlink_payroll
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. API backend credentials
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payroll-api
    restart: always
    ports:
      - "5016:8080"
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Port=5432;Database=sekyurlink_payroll;User Id=postgres;Password=root;"

volumes:
  pgdata: